<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080408;color:#e8d0d8;font-family:'DM Sans',sans-serif;min-height:100vh}

/* LOGIN */
#loginScreen{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#080408;z-index:100;
}
.login-card{
  background:#140a10;border:1px solid #301020;
  border-radius:20px;padding:48px 40px;
  width:min(320px,90vw);text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.login-symbol{font-size:2rem;margin-bottom:20px;display:block}
.login-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;color:#e8326a;
  margin-bottom:28px;font-style:italic;
}
.login-input{
  width:100%;padding:12px 16px;
  background:#1e0d16;border:1px solid #301020;
  border-radius:10px;color:#f0e0e8;
  font-family:'DM Mono',monospace;font-size:.9rem;
  outline:none;margin-bottom:12px;letter-spacing:.1em;
}
.login-input:focus{border-color:#e8326a}
.login-input::placeholder{color:#5a2535;letter-spacing:0}
.login-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#c41e53,#e8326a);
  color:white;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer;margin-top:4px;
}
.login-err{color:#e8326a;font-size:.8rem;margin-top:10px;min-height:18px}

/* DASHBOARD */
#dashboard{display:none}

.dash-header{
  background:#0d060a;border-bottom:1px solid #1e0a10;
  padding:16px 24px;
  display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:10px;
  position:sticky;top:0;z-index:50;
}
.dash-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.2rem;font-style:italic;color:#e8326a;
}
.dash-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

.ctrl-btn{
  background:transparent;border:1px solid #301020;
  color:#c0a0b0;padding:7px 14px;border-radius:8px;
  font-size:.72rem;cursor:pointer;
  font-family:'DM Mono',monospace;
  transition:border-color .2s,color .2s;white-space:nowrap;
}
.ctrl-btn:hover{border-color:#e8326a;color:#e8326a}
.ctrl-btn.danger{border-color:#3a0a18;color:#804060}
.ctrl-btn.danger:hover{border-color:#e8326a;color:#ff4060}

/* USER SELECTOR */
.user-bar{
  background:#0a0408;border-bottom:1px solid #1e0a10;
  padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.user-label{font-size:.75rem;color:#805060;font-family:'DM Mono',monospace;white-space:nowrap}
.user-select{
  background:#140a10;border:1px solid #301020;
  color:#f0e0e8;padding:8px 12px;border-radius:8px;
  font-family:'DM Mono',monospace;font-size:.8rem;
  outline:none;cursor:pointer;flex:1;min-width:200px;
}
.user-select:focus{border-color:#e8326a}

/* FINAL HERO */
.final-hero{
  background:linear-gradient(160deg,#1a0510 0%,#0d030a 100%);
  border-bottom:1px solid #2a1020;
  padding:48px 28px;text-align:center;position:relative;overflow:hidden;
}
.final-hero::before{
  content:'';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(232,50,106,.08) 0%,transparent 70%);
  pointer-events:none;
}
.final-label{
  font-family:'DM Mono',monospace;font-size:.68rem;
  color:#e8326a;letter-spacing:.15em;text-transform:uppercase;
  margin-bottom:20px;opacity:.8;
}
.final-q{
  font-family:'Cormorant Garamond',serif;font-size:1rem;
  font-style:italic;color:rgba(255,255,255,.45);
  margin-bottom:24px;line-height:1.6;
}
.final-answer{
  font-family:'Cormorant Garamond',serif;font-size:1.5rem;
  font-style:italic;color:#fff;line-height:1.7;
  max-width:560px;margin:0 auto;position:relative;z-index:1;
}
.final-answer.empty{color:rgba(255,255,255,.25);font-size:1rem}

/* STATS */
.stats-bar{display:flex;gap:0;border-bottom:1px solid #1e0a10;overflow-x:auto}
.stat-item{
  flex:1;min-width:80px;padding:20px 16px;
  text-align:center;border-right:1px solid #1e0a10;
}
.stat-item:last-child{border-right:none}
.stat-num{
  font-family:'DM Mono',monospace;font-size:1.5rem;
  color:#e8326a;display:block;margin-bottom:4px;
}
.stat-label{
  font-size:.65rem;color:rgba(232,208,216,.45);
  text-transform:uppercase;letter-spacing:.08em;
}

/* ANSWERS */
.answers-wrap{padding:24px;max-width:720px;margin:0 auto}

.section-divider{
  display:flex;align-items:center;gap:12px;
  margin:36px 0 18px;
}
.section-divider span{
  font-family:'DM Mono',monospace;font-size:.66rem;
  color:rgba(232,208,216,.4);text-transform:uppercase;
  letter-spacing:.12em;white-space:nowrap;
}
.section-divider::before,.section-divider::after{
  content:'';flex:1;height:1px;background:#1e0a10;
}

.answer-card{
  background:#0d060a;border:1px solid #1e0a10;
  border-radius:14px;padding:20px 22px;
  margin-bottom:12px;position:relative;
  transition:border-color .2s;
}
.answer-card:hover{border-color:#2a1020}
.answer-card.escape-card{border-color:rgba(232,50,106,.2);background:#0f060a}
.answer-card.text-card{background:#0a0610;border-color:#1a1030}
.answer-card.unanswered{
  background:transparent;border:1px dashed #1e0a10;opacity:.4;
}

.q-num{
  font-family:'DM Mono',monospace;font-size:.66rem;
  color:#e8326a;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.1em;opacity:.75;
}
.q-display{
  font-size:.83rem;color:rgba(232,208,216,.7);
  line-height:1.55;margin-bottom:14px;
}
.a-display{
  font-family:'Cormorant Garamond',serif;
  font-size:1.15rem;color:#f5e8ee;line-height:1.6;
}
.a-display.text-answer{font-size:1.2rem;color:#ffffff;font-style:italic}
.a-display.empty-answer{color:rgba(232,208,216,.2);font-size:.85rem;font-family:'DM Sans',sans-serif;font-style:italic}

.escape-badge{
  position:absolute;top:14px;right:14px;
  background:rgba(232,50,106,.15);color:#ff6090;
  font-size:.65rem;padding:3px 10px;border-radius:20px;
  font-family:'DM Mono',monospace;
}
.time-badge{
  position:absolute;bottom:12px;right:14px;
  font-family:'DM Mono',monospace;font-size:.62rem;
  color:rgba(232,208,216,.28);
}

.loading-dash{
  display:flex;align-items:center;justify-content:center;
  height:200px;color:rgba(232,208,216,.3);
  font-family:'DM Mono',monospace;font-size:.8rem;letter-spacing:.1em;

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:200;display:none;
}
.modal-overlay.show{display:flex}
.modal-box{

.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;cursor:pointer;border:none}
.modal-cancel{background:#1e0a10;color:#c0a0b0}
.modal-confirm{background:linear-gradient(135deg,#8a0a2a,#c41e53);color:white}
</style>

const SECTION_LABELS={
  0:'Section 1 — Who She Is',
  3:'Section 2 — Abundance & Judgment',
  8:'Section 3 — The Group & People',
  15:'Section 4 — What She Does With People Who Stay',
  21:'Section 5 — The Disrespect & Early Days',

};

// LOGIN
function adminLogin(){
  const val=document.getElementById('adminPass').value;
  if(val===ADMIN_PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadDashboard();
  } else {
    document.getElementById('loginErr').textContent='Wrong key.';
  }
}
document.getElementById('adminPass').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin()});

// SUPABASE
async function supaGet(path){
  const res=await fetch(SUPABASE_URL+path,{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
  try{return await res.json()}catch(e){return null}
}

async function supaDelete(path){
  await fetch(SUPABASE_URL+path,{
    method:'DELETE',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  });
}

// LOAD DASHBOARD
async function loadDashboard(){
  // Load all users
  const users=await supaGet('/rest/v1/form_users?order=created_at.desc&limit=50');
  allUsers=Array.isArray(users)?users:[];

  const sel=document.getElementById('userSelect');
  if(allUsers.length===0){
    sel.innerHTML='<option value="">No users yet</option>';
    return;
  }

  sel.innerHTML=allUsers.map(u=>
    `<option value="${u.email}">${u.email} ${u.completed?'✓':''}</option>`
  ).join('');

  // Auto-select first or keep current
  if(!selectedEmail||!allUsers.find(u=>u.email===selectedEmail)){
    selectedEmail=allUsers[0].email;
  }
  sel.value=selectedEmail;
  await loadUserAnswers(selectedEmail);
}

function onUserChange(){
  selectedEmail=document.getElementById('userSelect').value;
  if(selectedEmail) loadUserAnswers(selectedEmail);
}

async function loadUserAnswers(email){
  document.getElementById('answersWrap').innerHTML='<div class="loading-dash">Loading...</div>';

  // User status
  const user=allUsers.find(u=>u.email===email);
  if(user){
    document.getElementById('userStatus').textContent=
      (user.completed?'✓ Completed':'In progress')+
      ' · '+new Date(user.last_seen).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  }

  // Load answers for this user
  const answers=await supaGet('/rest/v1/form_answers?user_email=eq.'+encodeURIComponent(email)+'&order=question_index&limit=200');
  const ansMap={};
  if(Array.isArray(answers)) answers.forEach(a=>{ansMap[a.question_index]=a});

  // Stats
  const answered=Object.keys(ansMap).length;
  const escaped=Object.values(ansMap).filter(a=>a.is_escape).length;
  const textAnswered=QUESTIONS.filter((q,i)=>q.type!=='single'&&ansMap[i]&&ansMap[i].answer).length;
  document.getElementById('statAnswered').textContent=answered+'/'+QUESTIONS.length;
  document.getElementById('statEscape').textContent=escaped;
  document.getElementById('statText').textContent=textAnswered;
  document.getElementById('statComplete').textContent=user&&user.completed?'Yes ✓':'No';

  // Final answer
  const finalA=ansMap[QUESTIONS.length-1];
  const finalEl=document.getElementById('finalAnswerDisplay');
  if(finalA&&finalA.answer){
    finalEl.textContent=finalA.answer;
    finalEl.className='final-answer';
  } else {
    finalEl.textContent='Not answered yet.';
    finalEl.className='final-answer empty';
  }

  // Render answers
  let html='';
  for(let i=0;i<QUESTIONS.length;i++){
    if(SECTION_LABELS[i]!==undefined){
      html+=`<div class="section-divider"><span>${SECTION_LABELS[i]}</span></div>`;
    }
    const q=QUESTIONS[i];
    const a=ansMap[i];
    const isText=q.type!=='single';
    const isEscape=a&&a.is_escape;
    const mins=a?Math.floor(a.time_spent_seconds/60):0;
    const secs=a?a.time_spent_seconds%60:0;
    const timeStr=mins>0?`${mins}m ${secs}s`:`${secs||0}s`;

    if(!a){
      html+=`<div class="answer-card unanswered">
        <div class="q-num">Q${i+1} · ${isText?'Text':'Choice'}</div>
        <div class="q-display">${q.text}</div>
        <div class="a-display empty-answer">— Not answered yet —</div>
      </div>`;
      continue;
    }

    const cardClass=isEscape?'escape-card':isText?'text-card':'';
    html+=`<div class="answer-card ${cardClass}">
      <div class="q-num">Q${i+1} · ${isText?'Text':'Choice'}</div>
      <div class="q-display">${q.text}</div>
      <div class="a-display ${isText?'text-answer':''}">${a.answer||'—'}</div>
      ${isEscape?'<div class="escape-badge">🙃 Escaped</div>':''}
      <div class="time-badge">${timeStr}</div>
    </div>`;
  }

  document.getElementById('answersWrap').innerHTML=html;
}

  emailToDelete='';
}

async function confirmDelete(){
  if(!emailToDelete) return;
  closeModal();
  await supaDelete('/rest/v1/form_answers?user_email=eq.'+encodeURIComponent(emailToDelete));
  await supaDelete('/rest/v1/form_users?email=eq.'+encodeURIComponent(emailToDelete));
  selectedEmail='';
  await loadDashboard();
}
</script>
