<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #080408;
  color: #e8d0d8;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* LOGIN */
#loginScreen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #080408;
  z-index: 100;
}

.login-card {
  background: #120810;
  border: 1px solid #2a1020;
  border-radius: 20px;
  padding: 48px 40px;
  width: 320px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.login-symbol { font-size: 2rem; margin-bottom: 20px; display: block; }

.login-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem;
  color: #e8326a;
  margin-bottom: 28px;
  font-style: italic;
}

.login-input {
  width: 100%;
  padding: 12px 16px;
  background: #1a0a12;
  border: 1px solid #2a1020;
  border-radius: 10px;
  color: #e8d0d8;
  font-family: 'DM Mono', monospace;
  font-size: 0.9rem;
  outline: none;
  margin-bottom: 12px;
  letter-spacing: 0.1em;
}
.login-input:focus { border-color: #e8326a; }
.login-input::placeholder { color: #4a2030; letter-spacing: 0; }

.login-btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, #c41e53, #e8326a);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  margin-top: 4px;
}

.login-err { color: #e8326a; font-size: 0.8rem; margin-top: 10px; min-height: 18px; }

/* DASHBOARD */
#dashboard { display: none; }

.dash-header {
  background: #0d060a;
  border-bottom: 1px solid #1a0a12;
  padding: 20px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.dash-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-style: italic;
  color: #e8326a;
}

.dash-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: #4a2030;
}

/* FINAL ANSWER HERO */
.final-hero {
  background: linear-gradient(160deg, #1a0510 0%, #0d030a 100%);
  border-bottom: 1px solid #2a1020;
  padding: 48px 28px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.final-hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(232,50,106,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.final-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: #e8326a;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 20px;
  opacity: 0.7;
}

.final-q {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: rgba(255,255,255,0.4);
  margin-bottom: 24px;
  line-height: 1.6;
}

.final-answer {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-style: italic;
  color: #fff;
  line-height: 1.7;
  max-width: 560px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.final-answer.empty {
  color: rgba(255,255,255,0.2);
  font-size: 1rem;
}

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid #1a0a12;
}

.stat-item {
  flex: 1;
  padding: 20px;
  text-align: center;
  border-right: 1px solid #1a0a12;
}
.stat-item:last-child { border-right: none; }

.stat-num {
  font-family: 'DM Mono', monospace;
  font-size: 1.6rem;
  color: #e8326a;
  display: block;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 0.7rem;
  color: #4a2030;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ANSWERS LIST */
.answers-wrap { padding: 28px; max-width: 720px; margin: 0 auto; }

.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 36px 0 20px;
}
.section-divider span {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: #2a1020;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  white-space: nowrap;
}
.section-divider::before, .section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #1a0a12;
}

.answer-card {
  background: #0d060a;
  border: 1px solid #1a0a12;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 14px;
  transition: border-color 0.2s;
  position: relative;
}
.answer-card:hover { border-color: #2a1020; }

.answer-card.escape-card { border-color: rgba(232,50,106,0.15); }
.answer-card.text-card   { border-color: #1a1020; background: #0a0610; }

.q-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem;
  color: #3a1520;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.q-display {
  font-size: 0.82rem;
  color: rgba(232,208,216,0.5);
  line-height: 1.5;
  margin-bottom: 14px;
}

.a-display {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: #e8d0d8;
  line-height: 1.6;
}
.a-display.text-answer {
  font-size: 1.15rem;
  color: #fff;
  font-style: italic;
}
.a-display.empty-answer {
  color: #2a1020;
  font-size: 0.85rem;
  font-style: italic;
  font-family: 'DM Sans', sans-serif;
}

.escape-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(232,50,106,0.12);
  color: #e8326a;
  font-size: 0.68rem;
  padding: 3px 10px;
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
}

.time-badge {
  position: absolute;
  bottom: 14px;
  right: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: #2a1020;
}

/* Unanswered */
.unanswered-card {
  background: transparent;
  border: 1px dashed #1a0a12;
  border-radius: 16px;
  padding: 16px 24px;
  margin-bottom: 14px;
  opacity: 0.4;
}

/* Loading */
.loading-dash {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: #2a1020;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
}

/* Refresh */
.refresh-btn {
  background: transparent;
  border: 1px solid #2a1020;
  color: #4a2030;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.72rem;
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  transition: border-color 0.2s, color 0.2s;
}
.refresh-btn:hover { border-color: #e8326a; color: #e8326a; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <span class="login-symbol">🔐</span>
    <div class="login-title">Admin Access</div>
    <input class="login-input" id="adminPass" type="password" placeholder="Enter access key" autocomplete="off"/>
    <button class="login-btn" onclick="adminLogin()">Enter</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <div class="dash-title">Prachi — Answers</div>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
      <div class="dash-meta" id="dashMeta">Loading...</div>
    </div>
  </div>

  <!-- Q53 HERO -->
  <div class="final-hero">
    <div class="final-label">✦ The Last Question ✦</div>
    <div class="final-q">"Tumhi ho jo mujhe samajhte ho" — yeh tumne kaha tha.<br/>Toh phir kya hua?</div>
    <div class="final-answer" id="finalAnswerDisplay">Loading...</div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-num" id="statAnswered">-</span>
      <span class="stat-label">Answered</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statEscape">-</span>
      <span class="stat-label">Escaped 🙃</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statText">-</span>
      <span class="stat-label">Text boxes</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statComplete">-</span>
      <span class="stat-label">Complete</span>
    </div>
  </div>

  <!-- ALL ANSWERS -->
  <div class="answers-wrap" id="answersWrap">
    <div class="loading-dash">Loading answers...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://zegezearsbpvomoazgju.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplZ2V6ZWFyc2Jwdm9tb2F6Z2p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1Mzk1NzUsImV4cCI6MjA5MTExNTU3NX0.0Z08rl4OgvrITuhBFlNQiY4NwmwNkO3ttLbi6IdoxPs';
const ADMIN_PASS = 'FCKTHSALL';

const QUESTIONS = [
  {type:'single',text:'Jab tum kisi naye group ya circle mein enter karti ho — tumhara pehla instinct kya hota hai?'},
  {type:'single',text:'Koi naya insaan tumhari life mein aata hai. Tum use kab seriously lena shuru karti ho?'},
  {type:'text',text:'Ek aisi cheez jo tum kisi bhi naye relationship mein sabse pehle dhundti ho.'},
  {type:'single',text:'Kabhi aisa moment aaya jab life suddenly exciting lagne lagi?'},
  {type:'single',text:'Us waqt jo decisions liye — tumne liye ya circumstances ne?'},
  {type:'text',text:'Ek aisa waqt jab trust galat sabit hua — pehla reaction?'},
  {type:'single',text:'Jab koi future ka promise kare — tum kaise decide karti ho believe karna hai?'},
  {type:'single',text:'Agar kisi ke saath risky situation mein loss hota — tumhara reaction?'},
  {type:'text',text:'Us time ke logon ko aaj kaise describe karogi?'},
  {type:'single',text:'Kya kabhi aisa laga ki koi genuinely invested tha bina reason ke?'},
  {type:'single',text:'Jab kisi ne bina maange kuch kiya — tumhara default response?'},
  {type:'text',text:'Koi tha jo samajhta tha bina bole bhi — kaun tha woh tumhare liye?'},
  {type:'single',text:'Jab group dynamics shift hone lage — tum ne kya kiya?'},
  {type:'single',text:'Koi tha jo hamesha tha par seriously nahi liya — kyun?'},
  {type:'text',text:'Woh insaan jo dikhta nahi tha clearly par tha — ab kya sochti ho?'},
  {type:'single',text:'Jab koi bad times mein consistently present raha — tum ne use kya diya?'},
  {type:'single',text:'Kya tumne kabhi kisi ko close rakha par accountable nahi hona pada?'},
  {type:'text',text:'"Tune mujhe apne paas kyun rakha agar seriously nahi lena tha" — kya kahogi?'},
  {type:'single',text:'Jab koi genuinely dekhta tha aur kabhi against nahi kiya — tum ne use kya samjha?'},
  {type:'single',text:'"Jo log care karte hain unhe hum for granted lete hain" — kitna true hai?'},
  {type:'text',text:'Koi tha jise for granted liya — consciously ya unconsciously. Ab kya feel hota hai?'},
  {type:'single',text:'Koi tha jo attention deta tha naye circle mein — seriously kyun nahi liya?'},
  {type:'single',text:'Kya tumne kabhi kisi ko hurt kiya — not intentionally?'},
  {type:'text',text:'Ek moment jab kisi ke saath aisa kiya jo sahi nahi tha — acknowledge kiya?'},
  {type:'single',text:'Jab koi baar baar kuch karta raha aur tum jaanti thi — respond nahi kiya clearly?'},
  {type:'single',text:'Tumhare liye relationship mein sabse important kya hai?'},
  {type:'single',text:'Koi jo deeply love kare — tumhara default reaction?'},
  {type:'text',text:'Tum kya sochti ho tumhare layak kya hai? Honestly.'},
  {type:'single',text:'Kya tumne kabhi khud ko aisi situation mein rakha jahan fully loved nahi thi?'},
  {type:'single',text:'Jo insaan tumse sabse zyada samjha — uske saath kya hua?'},
  {type:'single',text:'Koi tha jo dekh sakta tha aur usne fix karne ki koshish nahi ki — woh kya tha?'},
  {type:'text',text:'Woh insaan jo samjhta tha — uske baare mein kya socha? Uski feelings ke baare mein.'},
  {type:'single',text:'Agar woh quietly chala jaaye — pehla honest feeling?'},
  {type:'single',text:'Usne jo diya — kya tum ne uske barabar kuch diya?'},
  {type:'text',text:'Agar use kuch keh sakti — directly — kya kahogi?'},
  {type:'single',text:'Aaj tumhari life mein kya sabse zyada drain karta hai?'},
  {type:'single',text:'Kya tumhe lagta hai tum sahi jagah ho abhi?'},
  {type:'text',text:'Ek cheez jo chahti ho koi samjhe — jo kisi ko nahi bola.'},
  {type:'single',text:'Koi genuinely connected tha — usse door kyun rakha?'},
  {type:'single',text:'Agar woh wapas aaye — kya tum ready hogi honestly answer karne ke liye?'},
  {type:'single',text:'Woh khush tha ya kuch carry kar raha tha andar?'},
  {type:'text',text:'Agar uske andar jhank sakti — jo feel karta tha par kehta nahi tha — woh kya hoga?'},
  {type:'single',text:'Kya woh tumse zyada invest tha — tumhari comparison mein?'},
  {type:'single',text:'Uski jo cheez tumhe sabse zyada yaad rahegi?'},
  {type:'text',text:'Kuch aisa jo kabhi nahi kaha par kehna chahti thi.'},
  {type:'single',text:'Usne jo diya — kya woh waste tha uske liye?'},
  {type:'text',text:'"Kuch log sirf hone ke liye aate hain" — real lagta hai? Aur kya woh tha woh insaan?'},
  {type:'text',text:'Bachpan mein kya banana chahti thi? Woh dream jo shayad kisi ko nahi bataya.'},
  {type:'single',text:'Jab sab theek nahi hota — khud ko kaise sambhalti ho?'},
  {type:'text',text:'Ek cheez jo chahti ho koi kare — jo abhi tak kisi ne nahi kiya.'},
  {type:'single',text:'Tum khud ko kaisi insaan maanti ho — honestly?'},
  {type:'text',text:'Agar zindagi mein ek cheez change kar sakti — woh kya hota?'},
  {type:'text',text:'"Tumhi ho jo mujhe samajhte ho" — yeh tumne kaha tha.\n\nToh phir kya hua?', isFinal: true}
];

const SECTION_LABELS = {
  0: 'Section 1 — Who She Is',
  3: 'Section 2 — Abundance & Judgment',
  8: 'Section 3 — The Group & People',
  15: 'Section 4 — What She Does With People Who Stay',
  21: 'Section 5 — The Disrespect & Early Days',
  25: 'Section 6 — What She Thinks Love Is',
  30: 'Section 7 — Draven',
  35: 'Section 8 — Her Condition Now',
  38: 'Section 9 — The Real Questions',
  40: 'Section 10 — His Inner World',
  47: 'Section 11 — Her Inner Child',
  52: '✦ The Final Question'
};

function adminLogin() {
  const val = document.getElementById('adminPass').value;
  if (val === ADMIN_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('loginErr').textContent = 'Wrong key.';
  }
}

document.getElementById('adminPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') adminLogin();
});

async function supaFetch(path) {
  const res = await fetch(SUPABASE_URL + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY
    }
  });
  return res.json();
}

async function loadDashboard() {
  document.getElementById('answersWrap').innerHTML = '<div class="loading-dash">Loading answers...</div>';

  // Load user
  const users = await supaFetch('/rest/v1/form_users?order=created_at.desc&limit=1');
  const user = users && users[0];
  if (user) {
    document.getElementById('dashMeta').textContent =
      user.email + ' · ' + (user.completed ? '✓ Completed' : 'In progress') +
      ' · ' + new Date(user.last_seen).toLocaleDateString('en-IN');
  }

  // Load answers
  const answers = await supaFetch('/rest/v1/form_answers?order=question_index&limit=200');
  const ansMap = {};
  if (Array.isArray(answers)) {
    answers.forEach(a => { ansMap[a.question_index] = a; });
  }

  // Stats
  const answered = Object.keys(ansMap).length;
  const escaped = Object.values(ansMap).filter(a => a.is_escape).length;
  const textAnswers = QUESTIONS.filter((q,i) => q.type === 'text' && ansMap[i] && ansMap[i].answer).length;
  document.getElementById('statAnswered').textContent = answered + '/53';
  document.getElementById('statEscape').textContent = escaped;
  document.getElementById('statText').textContent = textAnswers;
  document.getElementById('statComplete').textContent = user && user.completed ? 'Yes ✓' : 'No';

  // Final answer hero
  const finalA = ansMap[52];
  const finalEl = document.getElementById('finalAnswerDisplay');
  if (finalA && finalA.answer) {
    finalEl.textContent = finalA.answer;
    finalEl.className = 'final-answer';
  } else {
    finalEl.textContent = 'Not answered yet.';
    finalEl.className = 'final-answer empty';
  }

  // Render all answers
  let html = '';
  for (let i = 0; i < QUESTIONS.length; i++) {
    if (SECTION_LABELS[i]) {
      html += `<div class="section-divider"><span>${SECTION_LABELS[i]}</span></div>`;
    }
    const q = QUESTIONS[i];
    const a = ansMap[i];

    if (!a) {
      html += `<div class="unanswered-card">
        <div class="q-num">Q${i+1}</div>
        <div class="q-display">${q.text.replace(/\n/g,'<br/>')}</div>
        <div class="a-display empty-answer">— Not answered yet —</div>
      </div>`;
      continue;
    }

    const isText = q.type === 'text';
    const isEscape = a.is_escape;
    const cardClass = isEscape ? 'escape-card' : isText ? 'text-card' : '';
    const mins = Math.floor(a.time_spent_seconds / 60);
    const secs = a.time_spent_seconds % 60;
    const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

    html += `<div class="answer-card ${cardClass}">
      <div class="q-num">Q${i+1} ${isText ? '· Text' : '· Choice'}</div>
      <div class="q-display">${q.text.replace(/\n/g,'<br/>')}</div>
      <div class="a-display ${isText ? 'text-answer' : ''}">${a.answer || '—'}</div>
      ${isEscape ? '<div class="escape-badge">🙃 Escaped</div>' : ''}
      <div class="time-badge">${timeStr}</div>
    </div>`;
  }

  document.getElementById('answersWrap').innerHTML = html;
}
</script>
</body>
</html>
